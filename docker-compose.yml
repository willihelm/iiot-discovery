services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/#' -C 1 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7
    ports:
      - "${INFLUX_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_USERNAME:-admin}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_PASSWORD:-adminadminadmin}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG:-acme}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET:-iiot}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN:-iiot-demo-token-change-me}"
      DOCKER_INFLUXDB_INIT_RETENTION: "${INFLUXDB_RETENTION:-30d}"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping", "-h", "http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 20

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      INFLUX_URL: "${INFLUX_URL:-http://influxdb:8086}"
      INFLUX_ORG: "${INFLUXDB_ORG:-acme}"
      INFLUX_BUCKET: "${INFLUXDB_BUCKET:-iiot}"
      INFLUX_TOKEN: "${INFLUX_TOKEN:-iiot-demo-token-change-me}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy

  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    environment:
      MQTT_URL: "${MQTT_URL:-mqtt://mosquitto:1883}"
      MQTT_TOPIC_PREFIX: "${MQTT_TOPIC_PREFIX:-uns/v1/acme/berlin/packaging}"
      INFLUX_URL: "${INFLUX_URL:-http://influxdb:8086}"
      INFLUX_TOKEN: "${INFLUX_TOKEN:-iiot-demo-token-change-me}"
      INFLUX_ORG: "${INFLUXDB_ORG:-acme}"
      INFLUX_BUCKET: "${INFLUXDB_BUCKET:-iiot}"
      INFLUX_MEASUREMENT: "${INFLUX_MEASUREMENT:-telemetry}"
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  sim-line1:
    build:
      context: .
      dockerfile: services/simulators/line1/Dockerfile
    environment:
      MQTT_URL: "${MQTT_URL:-mqtt://mosquitto:1883}"
      MQTT_TOPIC_PREFIX: "${MQTT_TOPIC_PREFIX:-uns/v1/acme/berlin/packaging}"
      PUBLISH_INTERVAL_MS: "${PUBLISH_INTERVAL_MS:-1000}"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  sim-line2:
    build:
      context: .
      dockerfile: services/simulators/line2/Dockerfile
    environment:
      MQTT_URL: "${MQTT_URL:-mqtt://mosquitto:1883}"
      MQTT_TOPIC_PREFIX: "${MQTT_TOPIC_PREFIX:-uns/v1/acme/berlin/packaging}"
      PUBLISH_INTERVAL_MS: "${PUBLISH_INTERVAL_MS:-1000}"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mosquitto_data:
  influxdb_data:
  influxdb_config:
  grafana_data:
